<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drive Player</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.wrapper{
position:relative;
width:100%;
max-width:900px;
aspect-ratio:16/9;
overflow:hidden;
}

iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

/* invisible click blocker */

.drive-block{
position:absolute;
top:0;
right:0;
width:160px;
height:80px;
background:transparent;
z-index:5;
}

/* image overlay */

.overlay{
position:absolute;
top:13.5px;
right:17px;
width:38px;
height:38px;
z-index:10;
border-radius:8px;
overflow:hidden;
}

.overlay img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<div class="wrapper">

<iframe src="https://drive.google.com/file/d/10tF9J0WHQ0s3gwwFDJmpfY3k15hdiFI6/preview" allow="fullscreen"></iframe>

<div class="drive-block"></div>

<a class="overlay" target="_blank">
<img src="https://content.jdmagicbox.com/v2/comp/junagadh/k7/9999px285.x285.240425185331.i2k7/catalogue/ayushy-gynec-hospital-kaj-junagadh-gynaecologist-and-obstetrician-doctors-42gogjfezc-250.jpg">
</a>

</div>

</body>

</html>
