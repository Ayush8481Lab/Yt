<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

body{
margin:0;
background:black;
}

.wrapper{
position:relative;
width:100%;
max-width:900px;
margin:auto;
aspect-ratio:16/9;
overflow:hidden;
}

iframe{
position:absolute;
top:-45px;
left:0;
width:100%;
height:calc(100% + 45px);
border:none;
}

</style>
</head>

<body>

<div class="wrapper">
<iframe src="https://drive.google.com/file/d/10tF9J0WHQ0s3gwwFDJmpfY3k15hdiFI6/preview"
allow="autoplay; fullscreen"></iframe>
</div>

</body>
</html>
